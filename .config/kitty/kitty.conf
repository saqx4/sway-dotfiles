# Kitty Terminal Configuration

# ========================================
# Font
# ========================================
font_family      JetBrains Mono Nerd Font
font_size        11.0

# ========================================
# Window
# ========================================
window_padding_width 6
enabled_layouts splits

# Background opacity (makes blur visible)
background_opacity 0.88

# Selection colors
selection_foreground #000000
selection_background #a6e3a1

# Cursor
cursor_shape block
cursor_blink_interval -1
cursor_text_color background

# Scrollback
scrollback_lines 10000

# Shell
shell bash

# Copy/Paste
copy_on_select yes

# ========================================
# Tabs
# ========================================
tab_bar_edge bottom
tab_bar_style powerline
tab_bar_min_tabs 2

# Tab colors
active_tab_foreground   #1e1e2e
active_tab_background   #89b4fa
inactive_tab_foreground #6c7086
inactive_tab_background #313244

tab_title_template "{index} {title}"

# ========================================
# Key Bindings
# ========================================
map ctrl+shift+v paste_from_clipboard
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+t new_tab
map ctrl+shift+w close_tab
map ctrl+shift+plus increase_font_size 1
map ctrl+shift+minus decrease_font_size 1

# ========================================
# Pywal Colors (auto-loaded from wallpaper)
# ========================================
include /home/sasa/.cache/wal/colors-kitty.conf

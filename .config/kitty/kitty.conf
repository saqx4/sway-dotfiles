# Kitty Configuration
# Catppuccin Mocha Theme

# Font
font_family      JetBrains Mono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.0

# Colors - Catppuccin Mocha
foreground       #cdd6f4
background       #1e1e2e
background_opacity 0.9

# Background blur
background_blur 10

# Cursor
cursor           #f5e0dc
cursor_text_color #1e1e2e

# Selection
selection_foreground #1e1e2e
selection_background #a6e3a1

# Colors - Black & Bright Black
color0  #45475a
color8  #585b70

# Colors - Red & Bright Red
color1  #f38ba8
color9  #f38ba8

# Colors - Green & Bright Green
color2  #a6e3a1
color10 #a6e3a1

# Colors - Yellow & Bright Yellow
color3  #f9e2af
color11 #f9e2af

# Colors - Blue & Bright Blue
color4  #89b4fa
color12 #89b4fa

# Colors - Magenta & Bright Magenta
color5  #cba6f7
color13 #cba6f7

# Colors - Cyan & Bright Cyan
color6  #94e2d5
color14 #94e2d5

# Colors - White & Bright White
color7  #bac2de
color15 #a6adc8

# Background opacity for blur to show
background_opacity 0.95

# Window layout
enabled_layouts splits
window_padding_width 8
window_margin_width 0

# Tabs
tab_bar_edge bottom
tab_bar_style powerline
tab_bar_min_tabs 2
active_tab_font_style normal
inactive_tab_font_style normal
tab_title_template {index} {title}

# Tab colors
active_tab_foreground   #1e1e2e
active_tab_background   #89b4fa
inactive_tab_foreground #6c7086
inactive_tab_background #313244

# Scrollback
scrollback_lines 10000

# Shell
shell bash

# Copy paste
copy_on_select yes
strip_trailing_spaces always

# Key bindings
map ctrl+shift+v paste_from_clipboard
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+t new_tab
map ctrl+shift+w close_tab
